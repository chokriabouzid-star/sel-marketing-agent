name: Scout + Forge + Gate + Dispatch

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

concurrency:
  group: agent-run
  cancel-in-progress: true

jobs:
  run:
    name: Agent Run
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build all binaries
        run: cargo build --release --bins

      - name: Scout
        run: ./target/release/scout
        env:
          REDDIT_CLIENT_ID:    ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_SECRET:       ${{ secrets.REDDIT_SECRET }}
          REDDIT_USERNAME:     ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD:     ${{ secrets.REDDIT_PASSWORD }}
          GITHUB_TOKEN:        ${{ secrets.GH_PAT }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          DATA_DIR:            data

      - name: Forge
        run: ./target/release/forge
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN:       ${{ secrets.GH_PAT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DATA_DIR:           data

      - name: Gate (check approvals)
        run: ./target/release/gate
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN:       ${{ secrets.GH_PAT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DATA_DIR:           data

      - name: Dispatch (publish approved)
        run: ./target/release/dispatch
        env:
          REDDIT_CLIENT_ID:   ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_SECRET:      ${{ secrets.REDDIT_SECRET }}
          REDDIT_USERNAME:    ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD:    ${{ secrets.REDDIT_PASSWORD }}
          DEVTO_API_KEY:      ${{ secrets.DEVTO_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DATA_DIR:           data

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: agent run ${{ github.run_id }}"
          file_pattern:   "data/*.jsonl"
          commit_user_name:  "SEL Agent"
          commit_user_email: "agent@noreply.github.com"
# Updated: $(date)
